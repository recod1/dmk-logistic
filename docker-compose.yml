version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmk_logistic}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dmk_logistic}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-recod0/dmk-logistic-api:latest}
    environment:
      POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dmk_logistic}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dmk_logistic}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_CLAIM_EMAIL: ${VAPID_CLAIM_EMAIL:-mailto:admin@localhost}
      BOOTSTRAP_DEMO_USER: ${BOOTSTRAP_DEMO_USER:-1}
      DEMO_LOGIN: ${DEMO_LOGIN:-driver}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-driver123}
      DEMO_ROLE: ${DEMO_ROLE:-driver}
      DB_PATH: ${DB_PATH:-/app/db/olymp.db}
      API_KEY: ${API_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      TG_TOKEN: ${TG_TOKEN:-}
      WIALON_TOKEN: ${WIALON_TOKEN:-}
      WIALON_BASE_URL: ${WIALON_BASE_URL:-}
      WIALON_API_BASE_URL: ${WIALON_API_BASE_URL:-}
      WIALON_AJAX_PATH: ${WIALON_AJAX_PATH:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    image: ${WEB_IMAGE:-recod0/dmk-logistic-web:latest}
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pg_data:

