name: Build and deploy to test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: recod0/dmk-logistic

jobs:
  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_test:
    name: Deploy to test server
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: ${{ secrets.TEST_SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            DEPLOY_PATH="${{ vars.TEST_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "GitHub Variable TEST_DEPLOY_PATH is not set"
              exit 1
            fi
            mkdir -p "$DEPLOY_PATH"

      - name: Upload docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: ${{ secrets.TEST_SERVER_PORT }}
          source: deploy/docker-compose.test.yml
          target: ${{ vars.TEST_DEPLOY_PATH }}
          strip_components: 1

      - name: Pull and restart container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          port: ${{ secrets.TEST_SERVER_PORT }}
          script_stop: true
          script: |
            set -e
            DEPLOY_PATH="${{ vars.TEST_DEPLOY_PATH }}"
            IMAGE="${{ env.IMAGE_REPOSITORY }}:latest"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "GitHub Variable TEST_DEPLOY_PATH is not set"
              exit 1
            fi

            cd "$DEPLOY_PATH"
            mv -f docker-compose.test.yml docker-compose.yml

            if [ ! -f .env ]; then
              echo ".env file not found in $DEPLOY_PATH"
              echo "Create .env with TG_TOKEN/API_KEY/WIALON_* values before deploy."
              exit 1
            fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export DOCKER_IMAGE="$IMAGE"

            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "Docker Compose is not installed on server"
              exit 1
            fi

            $DC pull
            $DC up -d --remove-orphans
            docker image prune -f
