name: Build and deploy dmkbot (Portainer)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*.*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_IMAGE_NAME: recod0/dmkbot
  DEFAULT_DEPLOY_TAG: latest
  DEFAULT_PORTAINER_STACK_ID: "17"
  DEFAULT_DEPLOY_PATH: /opt/dmkbot

jobs:
  build_and_push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      deploy_tag: ${{ steps.vars.outputs.deploy_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image and deploy tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${{ vars.IMAGE_NAME }}"
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="${{ env.DEFAULT_IMAGE_NAME }}"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            DEPLOY_TAG="${GITHUB_REF#refs/tags/}"
            DEPLOY_TAG="${DEPLOY_TAG#v}"
          else
            DEPLOY_TAG="${{ vars.TAG }}"
            if [ -z "$DEPLOY_TAG" ]; then
              DEPLOY_TAG="${{ env.DEFAULT_DEPLOY_TAG }}"
            fi
          fi

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=$DEPLOY_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ steps.vars.outputs.deploy_tag }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_test:
    name: Deploy to test via Portainer
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deploy settings
        id: deploy_vars
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="${{ env.DEFAULT_DEPLOY_PATH }}"
          fi

          STACK_ID="${{ vars.PORTAINER_STACK_ID }}"
          if [ -z "$STACK_ID" ]; then
            STACK_ID="${{ env.DEFAULT_PORTAINER_STACK_ID }}"
          fi

          ENDPOINT_ID="${{ vars.PORTAINER_ENDPOINT_ID }}"

          echo "deploy_path=$DEPLOY_PATH" >> "$GITHUB_OUTPUT"
          echo "stack_id=$STACK_ID" >> "$GITHUB_OUTPUT"
          echo "endpoint_id=$ENDPOINT_ID" >> "$GITHUB_OUTPUT"

      - name: Run Portainer deploy script
        shell: bash
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
          PORTAINER_STACK_ID: ${{ steps.deploy_vars.outputs.stack_id }}
          PORTAINER_ENDPOINT_ID: ${{ steps.deploy_vars.outputs.endpoint_id }}
          IMAGE_NAME: ${{ needs.build_and_push.outputs.image_name }}
          TAG: ${{ needs.build_and_push.outputs.deploy_tag }}
          DEPLOY_PATH: ${{ steps.deploy_vars.outputs.deploy_path }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          WIALON_TOKEN: ${{ secrets.WIALON_TOKEN }}
          WIALON_BASE_URL: ${{ secrets.WIALON_BASE_URL }}
          DB_PATH: ${{ secrets.DB_PATH }}
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          bash deploy/portainer-deploy.sh
