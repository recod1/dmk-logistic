name: Build and deploy DMK test

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  DEFAULT_PORTAINER_STACK_ID: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Docker image
        id: image
        shell: bash
        env:
          BASE_DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_DOCKER_IMAGE// }" ]; then
            echo "Repository variable DOCKER_IMAGE is required (example: recod0/dmkbot:latest)." >&2
            exit 1
          fi

          image_repo="$BASE_DOCKER_IMAGE"
          last_segment="${BASE_DOCKER_IMAGE##*/}"
          if [[ "$last_segment" == *:* ]]; then
            image_repo="${BASE_DOCKER_IMAGE%:*}"
          fi

          image_tag="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            image_tag="latest"
          fi

          docker_image="${image_repo}:${image_tag}"
          echo "docker_image=${docker_image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.docker_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Portainer stack
        shell: bash
        env:
          PORTAINER_URL: ${{ vars.PORTAINER_URL }}
          PORTAINER_STACK_ID: ${{ vars.PORTAINER_STACK_ID }}
          ENDPOINT_ID: ${{ vars.ENDPOINT_ID }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
          WIALON_TOKEN: ${{ secrets.WIALON_TOKEN }}
          DOCKER_IMAGE: ${{ steps.image.outputs.docker_image }}
        run: |
          set -euo pipefail
          if [ -z "${PORTAINER_STACK_ID:-}" ]; then
            PORTAINER_STACK_ID="${DEFAULT_PORTAINER_STACK_ID}"
          fi
          export PORTAINER_STACK_ID
          bash ./deploy/portainer_update_stack.sh
